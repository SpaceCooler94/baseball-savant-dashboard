name: Build Daily Board

# Runs the MLB model off-phone and commits the finished board JSON back to the repo,
# where Render serves it and MLB_Daily.js fetches it.
on:
  workflow_dispatch:      # manual "Run workflow" button -- use this for the first test run
  schedule:
    # 13:30 UTC = 9:30am ET (during EDT). GitHub cron is UTC-only and can be delayed
    # 10-30+ min on free runners, occasionally skipped -- fine for a daily board that
    # isn't time-critical to the minute. Adjust the hour if you want it earlier/later.
    - cron: "30 13 * * *"

# Needed so the workflow can commit the generated file back to the repo.
permissions:
  contents: write

jobs:
  build-board:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # the per-player StatsAPI loop is the slow part; generous cap

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # stable pairing with the pinned pandas 2.2 / numpy 1.26

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build the daily board
        run: python build_daily_board.py

      - name: Commit the board if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit if daily_board.json actually changed, so we don't create empty
          # commits on days the data is identical.
          if git diff --quiet -- daily_board.json; then
            echo "No change to daily_board.json -- nothing to commit."
          else
            git add daily_board.json
            git commit -m "Daily board: $(date -u +%Y-%m-%d)"
            git push
          fi
